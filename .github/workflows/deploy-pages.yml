name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build Next.js static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          # The key insight: Next.js 16 with basePath:'/zhiqi' outputs files 
          # in out/zhiqi/ subdirectory on CI (but flat on some local setups).
          # We need deploy/zhiqi/index.html to exist at the correct path.
          #
          # Strategy: Use rsync to copy the "effective zhiqi content" to deploy/zhiqi/
          # regardless of whether Next.js outputs flat or nested.
          
          mkdir -p deploy/zhiqi
          
          # Step 1: Find where the actual content is
          if [ -f "out/zhiqi/index.html" ]; then
            echo "Next.js 输出了 zhiqi/ 子目录结构"
            SOURCE_DIR="out/zhiqi"
          else
            echo "Next.js 输出了扁平结构"
            SOURCE_DIR="out"
          fi
          
          # Step 2: Copy content to deploy/zhiqi/
          rsync -a --delete "${SOURCE_DIR}/" deploy/zhiqi/
          
          # Step 3: Verify no double nesting
          if [ -d "deploy/zhiqi/zhiqi" ]; then
            echo "ERROR: 双重嵌套检测到！正在修复..."
            rsync -a --delete deploy/zhiqi/zhiqi/ deploy/zhiqi/
            rm -rf deploy/zhiqi/zhiqi
            echo "双重嵌套已修复"
          fi
          
          # Remove Next.js generated 404 pages
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # Create custom 404.html at root level
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Add .nojekyll
          touch deploy/zhiqi/.nojekyll
          
          # Final verification
          echo "=== 最终部署结构 ==="
          find deploy -maxdepth 2 -type f -o -type d | sort | head -30
          echo "=== 关键验证 ==="
          test -f deploy/zhiqi/index.html && echo "✓ deploy/zhiqi/index.html 存在" || echo "✗ deploy/zhiqi/index.html 不存在！"
          test ! -d deploy/zhiqi/zhiqi && echo "✓ 无双重嵌套" || echo "✗ 存在双重嵌套！"
          test -f deploy/404.html && echo "✓ deploy/404.html 存在" || echo "✗ deploy/404.html 不存在！"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
