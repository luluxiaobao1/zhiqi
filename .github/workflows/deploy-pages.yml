name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build Next.js static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          # Next.js 16 with basePath:'/zhiqi' may output files either:
          # 1. Flat under out/ (out/index.html, out/_next/...)
          # 2. Under out/zhiqi/ (out/zhiqi/index.html, out/zhiqi/_next/...)
          # We need to handle both cases to ensure deploy/zhiqi/index.html exists
          
          if [ -d "out/zhiqi" ]; then
            echo "检测到 out/zhiqi/ 目录（Next.js 已创建 basePath 子目录）"
            mkdir -p deploy
            cp -r out/zhiqi deploy/
          else
            echo "未检测到 out/zhiqi/ 目录，手动创建"
            mkdir -p deploy/zhiqi
            cp -r out/* deploy/zhiqi/
          fi
          
          # Remove Next.js generated 404.html - it contains client-side routing
          # logic that can cause infinite loops on GitHub Pages
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # Create custom 404.html at root level that redirects to /zhiqi/
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Add .nojekyll to prevent GitHub Pages from ignoring files starting with _
          touch deploy/zhiqi/.nojekyll
          
          # Verify deployment structure
          echo "=== 部署目录结构 ==="
          ls -la deploy/
          echo "=== zhiqi/ 目录 ==="
          ls deploy/zhiqi/ | head -15
          echo "=== 验证 index.html 存在 ==="
          ls -la deploy/zhiqi/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
