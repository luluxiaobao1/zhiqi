name: Deploy Next.js Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          # Next.js with basePath:'/zhiqi' outputs flat structure:
          # out/index.html, out/_next/..., out/admin/..., etc.
          # But resource paths in HTML reference /zhiqi/_next/..., /zhiqi/admin/..., etc.
          # GitHub Pages URL: https://user.github.io/zhiqi/
          # So we need: gh-pages/zhiqi/index.html, gh-pages/zhiqi/_next/..., etc.
          
          mkdir -p deploy/zhiqi
          cp -r out/* deploy/zhiqi/
          
          # Remove Next.js generated 404 (contains client-side routing that causes loops)
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # Add .nojekyll to allow _next directory
          touch deploy/zhiqi/.nojekyll
          
          # Create custom 404.html at root level
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Verify
          echo "=== 部署结构 ==="
          ls deploy/
          ls deploy/zhiqi/ | head -10
          test -f deploy/zhiqi/index.html && echo "✓ index.html 存在" || echo "✗ index.html 不存在"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
